<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="icons/icon48.png" alt="" width="20" height="20" />
      <span>Gist</span>
    </div>
    <button id="settingsBtn" class="icon-btn" data-i18n-title="settingsTitle" title="Settings">⚙</button>
  </header>

  <div id="noKeyBanner" class="banner hidden">
    <span data-i18n="bannerNoKey">No API key set.</span>
    <a href="#" id="openOptions" data-i18n="bannerLink">Add your key in settings</a>
  </div>

  <main>
    <section class="summarize">
      <div class="row">
        <label><span data-i18n="lengthLabel">Length</span>
          <select id="summaryLength">
            <option value="short" data-i18n="lenShort">Short (3 sentences)</option>
            <option value="medium" selected data-i18n="lenMedium">Medium (5 bullets)</option>
            <option value="long" data-i18n="lenLong">Detailed</option>
          </select>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="summarizeSelectionOnly" />
          <span data-i18n="selectionOnly">Selection only</span>
        </label>
      </div>
      <button id="summarizeBtn" class="primary" data-i18n="summarizeBtn">Summarize this page</button>
    </section>

    <div id="status" class="status hidden"></div>

    <div id="resultWrap" class="result-wrap hidden">
      <div id="result" class="result"></div>

      <div class="result-actions">
        <button id="copyBtn" class="ghost" data-i18n="copyBtn">Copy</button>
        <span id="copied" class="copied hidden" data-i18n="copiedMsg">Copied!</span>
        <span class="spacer"></span>
        <label class="tlang">
          <span data-i18n="translateLabel">Translate to</span>
          <select id="targetLang">
            <option value="English">English</option>
            <option value="한국어" selected>한국어</option>
            <option value="日本語">日本語</option>
            <option value="中文">中文</option>
            <option value="Español">Español</option>
            <option value="Français">Français</option>
            <option value="Deutsch">Deutsch</option>
          </select>
        </label>
        <button id="translateBtn" class="ghost" data-i18n="translateBtn">Translate</button>
        <button id="originalBtn" class="ghost hidden" data-i18n="originalBtn">Original</button>
      </div>
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
